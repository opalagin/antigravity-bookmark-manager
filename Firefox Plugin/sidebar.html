<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Smart Bookmarks Chat</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="sidebar.css">
</head>

<body>
    <div class="app-container chat">


        <div class="sub">
            <span>Chat</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-hover)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>

        <div id="chat-history" class="stream">
            <div class="message ai-message bubble bot">
                <div class="content">Hello! Ask me anything about your saved bookmarks.</div>
            </div>
        </div>

        <div class="compose">
            <textarea id="chat-input" class="field" placeholder="Ask a question..." rows="1"></textarea>
            <button id="send-btn" class="send" title="Send" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
            </button>
        </div>
    </div>
    <script src="lib/marked.min.js"></script>
    <script src="api.js"></script>
    <script src="sidebar.js"></script>
</body>

</html>
