<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bookmark Manager</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header style="position: relative; display: flex; justify-content: center; align-items: center; padding: 4px 0;">
            <div class="settings-container">
                <button id="settings-btn" class="icon-btn" title="Settings">⚙️</button>
                <div id="settings-dropdown" class="dropdown-menu hidden">
                    <button id="reembed-btn" class="dropdown-item">Reembed your bookmarks...</button>
                </div>
            </div>
            <h1 style="margin: 0; font-size: 1.2rem; color: var(--primary-color);">Smart Bookmarks</h1>
            <div id="logout-container" style="position: absolute; right: 0;"></div>
        </header>

        <main>
            <button id="save-btn" class="primary-btn">
                <span class="icon">🔖</span> Save Current Page
            </button>

            <div class="search-container" style="margin-top: 12px;">
                <input type="text" id="search-input" placeholder="Ask your bookmarks...">
            </div>

            <section class="recent-bookmarks">
                <h2>Recent</h2>
                <ul id="bookmarks-list">
                    <!-- Javascript will populate this -->
                    <li class="empty-state">Loading...</li>
                </ul>
            </section>
            
            <button id="manage-btn" class="secondary-btn" style="margin-top: 15px; width: 100%; padding: 8px; font-weight: bold; cursor: pointer; border-radius: 6px; border: 1px solid #ddd; background: #f8f9fa;">
                <span class="icon">📚</span> Manage Library
            </button>
        </main>
    </div>
    <script src="api.js"></script>
    <script src="popup.js"></script>
</body>

</html>
