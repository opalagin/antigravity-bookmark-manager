<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Bookmark Manager Settings</title>
    <link rel="stylesheet" href="variables.css">
    <style>
        body {
            font-family: var(--font);
            background-color: var(--page-canvas);
            color: var(--text);
            padding: 30px 24px;
            max-width: 440px;
            margin: 60px auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background-image: radial-gradient(1200px 600px at 18% -8%, rgba(126,110,240,0.08), transparent 60%);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }
        
        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
            color: var(--accent-hover);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        .helper {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 6px;
            display: block;
        }

        #apiUrl {
            margin-bottom: 2px;
        }

        #save {
            width: 100%;
            height: 40px;
        }

        .status {
            margin-top: 14px;
            color: #2ecc71;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
            background: rgba(46, 204, 113, 0.1);
            padding: 8px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
    </style>
</head>
<body>
    <h2>Settings</h2>
    
    <div class="form-group">
        <label for="apiUrl">Backend API URL:</label>
        <input type="text" id="apiUrl" class="field" placeholder="e.g. http://localhost">
        <span class="helper">Default: http://localhost</span>
    </div>
    
    <button id="save" class="btn">Save Settings</button>
    
    <div id="status" class="status">Settings saved successfully.</div>

    <script src="options.js"></script>
</body>
</html>
