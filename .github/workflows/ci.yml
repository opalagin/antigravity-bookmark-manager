name: Search Backend CI

on:
  pull_request:
    paths:
      - "Search Backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "Search Backend/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: "Search Backend"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    # Non-blocking baseline: surfaces pre-existing lint debt as PR annotations
    # without failing CI. Flip to blocking once the backlog is cleared.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uvx ruff@0.15.14 check .

  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    # Non-blocking baseline: surfaces pre-existing type debt as PR annotations
    # without failing CI. Flip to blocking once the error backlog is cleared.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "Search Backend/requirements.txt"
      - run: pip install -r requirements.txt
      - uses: jakebailey/pyright-action@v3
        with:
          working-directory: "."

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: "Search Backend"
          file: "Search Backend/Dockerfile"
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
