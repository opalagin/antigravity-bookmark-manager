name: Search Backend CI

on:
  pull_request:
    paths:
      - "Search Backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "Search Backend/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: "Search Backend"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "Search Backend"
          args: "check --select E,F"

  typecheck:
    name: Pyright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "Search Backend/requirements.txt"
      - run: pip install -r requirements.txt
      - uses: jakebailey/pyright-action@v2
        with:
          working-directory: "."

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: "Search Backend"
          file: "Search Backend/Dockerfile"
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
